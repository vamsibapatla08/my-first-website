<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Iceberg Drift</title>
	<style>
		:root {
			--sky-top: #3cb3f2;
			--sky-mid: #77d8ff;
			--sky-horizon: #b6f0ff;
			--deep-ocean: #0b1b4b;
			--ice-light: #f6fbff;
			--ice-mid: #d9eefc;
			--ice-shadow: #8abfe4;
			--ice-deep: #3b87c9;
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: #8adfff;
			font-family: system-ui, sans-serif;
		}

		body {
			display: grid;
			place-items: center;
		}

		.scene {
			position: relative;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background:
				linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 38%, var(--sky-horizon) 52%, #c8f5ff 57%, #dff8ff 60.8%, #cbeeff 62.3%, #182d67 62.8%, #0d1f52 100%);
		}

		.sun-glow {
			position: absolute;
			inset: -10% auto auto 58%;
			width: 36vmin;
			height: 36vmin;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.2) 28%, rgba(255,255,255,0.05) 50%, transparent 72%);
			filter: blur(6px);
			opacity: 0.65;
			transform: translateX(-50%);
		}

		.cloud {
			position: absolute;
			background: rgba(255, 255, 255, 0.24);
			border-radius: 999px;
			filter: blur(2px);
			animation: cloud-drift linear infinite;
		}

		.cloud::before,
		.cloud::after {
			content: "";
			position: absolute;
			background: inherit;
			border-radius: inherit;
		}

		.cloud.one {
			top: 6%;
			left: -18%;
			width: 18vmin;
			height: 2.4vmin;
			animation-duration: 95s;
		}

		.cloud.one::before {
			width: 10vmin;
			height: 5vmin;
			left: 2vmin;
			top: -2.1vmin;
		}

		.cloud.one::after {
			width: 6vmin;
			height: 3.4vmin;
			right: 1.8vmin;
			top: -1.4vmin;
		}

		.cloud.two {
			top: 14%;
			left: -22%;
			width: 14vmin;
			height: 2vmin;
			animation-duration: 120s;
			opacity: 0.4;
		}

		.cloud.two::before {
			width: 7vmin;
			height: 4vmin;
			left: 1.3vmin;
			top: -1.7vmin;
		}

		.cloud.three {
			top: 20%;
			left: -16%;
			width: 10vmin;
			height: 1.7vmin;
			animation-duration: 85s;
			opacity: 0.28;
		}

		.cloud.three::before {
			width: 5.5vmin;
			height: 3vmin;
			left: 1vmin;
			top: -1.2vmin;
		}

		.water-sheen {
			position: absolute;
			left: 0;
			right: 0;
			top: 55.9%;
			height: 10vh;
			background: linear-gradient(to bottom, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.32) 20%, rgba(255,255,255,0) 100%);
			opacity: 0.8;
			filter: blur(3px);
			animation: sheen 7s ease-in-out infinite;
		}

		.surface-line {
			position: absolute;
			left: 0;
			right: 0;
			top: 61.8%;
			height: 0.25vmin;
			background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.72) 16%, rgba(255,255,255,0.95) 50%, rgba(255,255,255,0.72) 84%, transparent 100%);
			box-shadow: 0 0 1.2vmin rgba(255,255,255,0.45);
		}

		.scene-stage {
			position: absolute;
			inset: 0;
			transform-origin: 50% 57%;
			animation: floaty 6.5s ease-in-out infinite;
		}

		.iceberg {
			position: absolute;
			left: 20%;
			top: 31.9%;
			width: min(86vw, 980px);
			aspect-ratio: 1.3;
			transform: translate(-50%, -50%);
			filter: drop-shadow(0 1.8vmin 1.4vmin rgba(15, 34, 77, 0.25));
		}

		.iceberg svg {
			width: 100%;
			height: 100%;
			overflow: visible;
		}

		.bobber {
			transform-box: fill-box;
			transform-origin: center;
			animation: bob 6.5s ease-in-out infinite;
		}

		.shine {
			position: absolute;
			inset: 0;
			background: radial-gradient(circle at 56% 31%, rgba(255,255,255,0.5), transparent 35%);
			mix-blend-mode: screen;
			pointer-events: none;
		}

		.particles {
			position: absolute;
			inset: 0;
			overflow: hidden;
			pointer-events: none;
		}

		.particle {
			position: absolute;
			bottom: -10vh;
			width: 0.45vmin;
			height: 0.45vmin;
			border-radius: 50%;
			background: rgba(177, 233, 255, 0.45);
			animation: rise linear infinite;
			filter: blur(0.15vmin);
		}

		.mist {
			position: absolute;
			left: 0;
			right: 0;
			top: 62.5%;
			height: 12vh;
			background: linear-gradient(to bottom, rgba(255,255,255,0.18), rgba(255,255,255,0));
			opacity: 0.45;
			filter: blur(16px);
			animation: mist-slide 12s ease-in-out infinite;
		}

		@keyframes floaty {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-0.7vmin); }
		}

		@keyframes bob {
			0%, 100% { transform: translateY(0) rotate(-0.1deg); }
			50% { transform: translateY(-1.1vmin) rotate(0.08deg); }
		}

		@keyframes cloud-drift {
			from { transform: translateX(0); }
			to { transform: translateX(160vw); }
		}

		@keyframes sheen {
			0%, 100% { transform: translateX(-1.5%); opacity: 0.7; }
			50% { transform: translateX(1.5%); opacity: 0.95; }
		}

		@keyframes mist-slide {
			0%, 100% { transform: translateX(-1%) scaleX(1); }
			50% { transform: translateX(1%) scaleX(1.03); }
		}

		@keyframes rise {
			from {
				transform: translateY(0) translateX(0) scale(1);
				opacity: 0;
			}
			15% { opacity: 0.45; }
			100% {
				transform: translateY(-78vh) translateX(var(--drift, 0px)) scale(1.3);
				opacity: 0;
			}
		}

		@media (prefers-reduced-motion: reduce) {
			.scene-stage,
			.bobber,
			.cloud,
			.water-sheen,
			.mist,
			.particle {
				animation: none !important;
			}
		}
	</style>
</head>
<body>
	<main class="scene" aria-label="Animated iceberg floating in arctic water">
		<div class="sun-glow"></div>
		<div class="cloud one"></div>
		<div class="cloud two"></div>
		<div class="cloud three"></div>
		<div class="mist"></div>
		<div class="water-sheen"></div>
		<div class="surface-line"></div>

							<stop offset="100%" stop-color="var(--ice-mid)" />

						<linearGradient id="waterGrad" x1="0" x2="0" y1="0" y2="1">

							<stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
						</linearGradient>

							<rect x="0" y="272" width="1000" height="488" rx="0" />

						<polygon points="683,298 705,221 756,170 798,233 784,286" fill="#d9edf9" opacity="0.92" />
						<path d="M 236 304 C 292 297, 347 293, 406 297 C 486 302, 565 302, 649 294 C 721 287, 789 287, 840 293" fill="none" stroke="#f8fdff" stroke-width="10" stroke-linecap="round" opacity="0.72" />
					</g>

					<g clip-path="url(#belowWater)">
						<polygon points="257,278 343,307 361,548 291,615 266,532 243,420 228,340" fill="#245aa1" opacity="0.8" />
						<polygon points="343,307 404,297 454,474 418,642 361,548" fill="#4d86c4" opacity="0.92" />
						<polygon points="404,297 470,306 509,548 454,474" fill="#7cb2dd" opacity="0.92" />
						<polygon points="470,306 549,307 558,563 509,548" fill="#4b86c7" opacity="0.9" />
						<polygon points="549,307 620,296 664,476 633,628 558,563" fill="#90c5ea" opacity="0.9" />

						<polygon points="691,304 777,294 772,466 715,520" fill="#90c9ef" opacity="0.85" />
						<polygon points="777,294 837,286 823,384 772,466" fill="#6da1d6" opacity="0.85" />
						<polygon points="291,615 361,548 418,642 387,752 307,733" fill="#153b76" opacity="0.92" />

						<polygon points="233,336 264,346 277,410 228,340" fill="#d9effd" opacity="0.42" />
						<polygon points="277,410 291,615 243,420" fill="#103262" opacity="0.35" />

						<polygon points="454,474 509,548 491,411 435,390" fill="#ffffff" opacity="0.18" />
						<polygon points="549,307 603,365 581,461 533,424" fill="#f2fbff" opacity="0.18" />

						<polygon points="691,304 729,353 727,500 715,520" fill="#f0fbff" opacity="0.12" />
						<path d="M 258 278 C 327 308, 410 313, 492 308 C 573 303, 658 304, 742 296 C 779 294, 812 292, 834 288" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="5" stroke-linecap="round" opacity="0.7" />
					</g>

					<g>
						<path d="M 159 274 C 250 284, 332 288, 437 284 C 543 280, 655 272, 760 273 C 822 274, 860 276, 875 273" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="6" stroke-linecap="round" opacity="0.8" />

						<path d="M 120 294 C 225 288, 337 286, 445 286 C 549 286, 660 291, 868 296" fill="none" stroke="url(#skyFade)" stroke-width="32" stroke-linecap="round" opacity="0.7" />
					</g>
				</svg>
				<div class="shine"></div>
			</div>
		</div>

		<div class="particles" id="particles"></div>
	</main>

	<script>
		const particles = document.getElementById('particles');
		const count = 46;

		for (let index = 0; index < count; index += 1) {
			const particle = document.createElement('span');
			particle.className = 'particle';
			particle.style.left = `${Math.random() * 100}%`;
			particle.style.animationDuration = `${12 + Math.random() * 20}s`;
			particle.style.animationDelay = `${Math.random() * -22}s`;
			particle.style.opacity = `${0.12 + Math.random() * 0.34}`;
			particle.style.width = `${0.22 + Math.random() * 0.55}vmin`;
			particle.style.height = particle.style.width;
			particle.style.setProperty('--drift', `${-18 + Math.random() * 36}px`);
			particles.appendChild(particle);
		}
	</script>
</body>
</html>
